<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        width: 360px;
        font-family: "Segoe UI", sans-serif;
        background: #080c10;
        color: #c9d4e0;
        padding: 18px;
      }
      .logo {
        font-size: 17px;
        font-weight: 800;
        color: #fff;
        margin-bottom: 14px;
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .logo-icon {
        width: 28px;
        height: 28px;
        background: linear-gradient(135deg, #4d9fff, #7b5fff);
        border-radius: 6px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 14px;
      }
      .logo span {
        color: #4d9fff;
      }
      .btn {
        width: 100%;
        padding: 12px;
        background: linear-gradient(135deg, #4d9fff, #6b8cff);
        border: none;
        border-radius: 8px;
        color: #fff;
        font-size: 13px;
        font-weight: 700;
        cursor: pointer;
        margin-bottom: 8px;
      }
      .btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
      .status {
        font-size: 11px;
        color: #6b7f94;
        text-align: center;
        min-height: 16px;
        margin-bottom: 8px;
        font-family: monospace;
      }
      .result {
        padding: 14px;
        background: #0d1117;
        border-radius: 10px;
        border: 1px solid #1e2d3d;
        display: none;
      }
    </style>
  </head>
  <body>
    <div class="logo">🔍 VeritasAI</div>
    <button class="btn" id="btn">Analyze</button>
    <div id="status"></div>
    <div id="result"></div>

    <!-- ✅ IMPORTANT: JS FILE LINK -->
    <script src="popup.js"></script>
  </body>
</html>
